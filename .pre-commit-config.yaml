# .pre-commit-config.yaml
# Synchronized with actually installed versions — April 2026
# VERIFIED rev tags match pip-installed versions.
#
# Install: pip install pre-commit && pre-commit install
#          pre-commit install --hook-type commit-msg
# Run all: pre-commit run --all-files

repos:
  # ── Code formatting ──────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black (auto-formatter)
        language_version: python3.11
        args: [--line-length=100]

  # ── Import ordering ──────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (import ordering)
        args: [--profile=black, --line-length=100]

  # ── Style checking ───────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: flake8 (style checker)
        additional_dependencies:
          - flake8-bugbear
          - flake8-docstrings

  # ── Security scanning (SAST) ─────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: bandit (SAST — HIGH severity only)
        args: [-ll, -r, src/]
        exclude: tests/

  # ── Secret detection ─────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (credential scanner)
        args: [--baseline, .secrets.baseline]
        exclude: >
          (?x)^(
            \.env$|
            \.venv/.*|
            \.pytest_cache/.*|
            htmlcov/.*|
            mlruns/.*|
            .*\.pkl$|
            validate_repo\.sh
          )$

  # ── General file hygiene ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: 'infra/.*\.tfvars'
      - id: check-yaml
        args: [--unsafe]    # azure-pipelines.yml uses custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^docs/screenshots/
      - id: no-commit-to-branch
        args: [--branch=main]

  # ── Conventional commit messages ─────────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.24.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

default_language_version:
  python: python3.11

exclude: |
  (?x)^(
    dbt/target/|
    dbt/dbt_packages/|
    \.terraform/|
    htmlcov/|
    \.venv/|
    mlruns/
  )$

fail_fast: false
