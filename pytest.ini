[pytest]
testpaths =
    src/ingestion/tests
    src/streaming/tests
    src/ai_validation/tests
    src/payer_simulation/tests

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src/ingestion
    --cov=src/ai_validation
    --cov=src/payer_simulation
    --cov=src/streaming
    --cov-config=pytest.ini
    --cov-report=term-missing
    --cov-fail-under=66

markers =
    integration: mark test as integration test (requires Kafka + Delta)
    slow: mark test as slow (SparkSession init > 30s)
    snowflake: mark test as requiring Snowflake connection

norecursedirs =
    .git
    .venv
    __pycache__
    target
    node_modules
    infra
    dbt
    data_quality

[coverage:run]
source = src
omit =
    */tests/*
    */__init__.py
    setup.py
    conftest.py
    # Spark-heavy — tested via integration tests (test_spark_jobs.py)
    */streaming/bronze_to_silver.py
    */streaming/claim_consumer.py
    */streaming/remittance_consumer.py
    */streaming/silver_to_gold.py
    */streaming/streaming_inference.py
    # Training scripts — run as CI stage, not unit tested
    */ai_validation/mlflow_utils.py
    */ai_validation/train_lgbm_model.py
    */ai_validation/train_denial_model.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    except ImportError
