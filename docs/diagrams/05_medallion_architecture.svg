  <line x1='829' y1='268' x2='1171' y2='268' stroke='#30363D' stroke-width='1'/>

  <text x='829' y='294' font-family='Segoe UI,system-ui,sans-serif' font-size='12' font-weight='700' fill='#FCD34D' letter-spacing='1'>TABLES</text>
  <text x='829' y='318' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>claims_summary    (50 rows)</text>
  <text x='829' y='338' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>provider_summary  (1/NPI)</text>
  <text x='829' y='358' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>denial_summary    (by code)</text>
  <text x='829' y='378' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#FCD34D'>remittance  (835 loop)</text>
