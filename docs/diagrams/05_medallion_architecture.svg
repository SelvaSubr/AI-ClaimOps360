  <text x='33' y='318' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>claim_id · claim_json</text>
  <text x='33' y='338' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>kafka_offset · source_topic</text>
  <text x='33' y='358' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>ingest_ts · partition_date</text>
