  <line x1='431' y1='268' x2='767' y2='268' stroke='#30363D' stroke-width='1'/>

  <text x='431' y='294' font-family='Segoe UI,system-ui,sans-serif' font-size='12' font-weight='700' fill='#6EE7B7' letter-spacing='1'>SCHEMA</text>
  <text x='431' y='318' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#8B949E'>13 base cols + 7 CMS AI fields</text>
  <text x='431' y='338' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#A78BFA'>denial_risk_score · decision_basis</text>
  <text x='431' y='358' font-family='JetBrains Mono,Consolas,monospace' font-size='12' fill='#A78BFA'>human_review_required · model_version</text>
  <line x1='431' y1='374' x2='767' y2='374' stroke='#30363D' stroke-width='1'/>

  <text x='431' y='400' font-family='Segoe UI,system-ui,sans-serif' font-size='12' font-weight='700' fill='#6EE7B7' letter-spacing='1'>RATIONALE</text>
  <text x='431' y='424' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#8B949E'>Run job twice → identical Silver.</text>
  <text x='431' y='444' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#8B949E'>Exactly-once semantics.</text>
  <text x='431' y='464' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#8B949E'>Z-ORDER by billing_npi+date.</text>
  <line x1='431' y1='480' x2='767' y2='480' stroke='#30363D' stroke-width='1'/>

  <text x='431' y='506' font-family='Segoe UI,system-ui,sans-serif' font-size='12' fill='#8B949E'>bronze_to_silver.py</text>

