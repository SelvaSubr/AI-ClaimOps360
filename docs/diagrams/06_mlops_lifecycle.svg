  <text x='83' y='240' font-family='JetBrains Mono,Consolas,monospace' font-size='13' fill='#C9D1D9'>billed_amount · has_prior_auth</text>
  <text x='83' y='260' font-family='JetBrains Mono,Consolas,monospace' font-size='13' fill='#C9D1D9'>diagnosis_count · member_eligible</text>

