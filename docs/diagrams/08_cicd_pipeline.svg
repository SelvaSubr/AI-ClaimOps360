  <text x='1048' y='244' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='12' fill='#8B949E'>MLflow aliases</text>
  <text x='1048' y='264' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='12' fill='#8B949E'>MLflow ≥ 2.9 API</text>

