  <text x='859' y='84' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' font-weight='700' fill='#1A56DB'>STAGE 4</text>
  <text x='859' y='115' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='16' font-weight='700' fill='white'>Build</text>
