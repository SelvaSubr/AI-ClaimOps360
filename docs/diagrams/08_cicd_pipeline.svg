  <rect x='205' y='89' width='175' height='248' rx='6' fill='#0D1117' stroke='#3B82F6' stroke-width='2'/>
  <rect x='205' y='89' width='175' height='46' rx='6' fill='#3B82F6'/><rect x='205' y='116' width='175' height='14' fill='#3B82F6'/>
  <text x='292' y='84' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' font-weight='700' fill='#3B82F6'>STAGE 1</text>
  <text x='292' y='115' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='16' font-weight='700' fill='white'>Lint</text>
  <text x='292' y='154' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#93C5FD'>yamllint</text>
  <text x='292' y='178' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#93C5FD'>black --check</text>
  <text x='292' y='200' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#93C5FD'>flake8</text>
  <text x='292' y='220' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#93C5FD'>bandit -ll</text>
  <text x='292' y='252' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='12' fill='#8B949E'>pipeline lints itself</text>
  <text x='292' y='272' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='12' fill='#8B949E'>dependsOn SecretScan</text>

