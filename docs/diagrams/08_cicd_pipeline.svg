  <line x1='569' y1='224' x2='583' y2='224' stroke='#30363D' stroke-width='2'/><polygon points='583,219 594,224 583,229' fill='#30363D'/>
  <line x1='758' y1='224' x2='772' y2='224' stroke='#30363D' stroke-width='2'/><polygon points='772,219 783,224 772,229' fill='#30363D'/>
  <line x1='947' y1='224' x2='961' y2='224' stroke='#30363D' stroke-width='2'/><polygon points='961,219 972,224 961,229' fill='#30363D'/>
  <line x1='1136' y1='224' x2='1150' y2='224' stroke='#30363D' stroke-width='2'/><polygon points='1150,219 1161,224 1150,229' fill='#30363D'/>

  <!-- S0 SecretScan x=16 w=175 -->
  <rect x='16' y='89' width='175' height='248' rx='6' fill='#0D1117' stroke='#D97706' stroke-width='2'/>
  <rect x='16' y='89' width='175' height='46' rx='6' fill='#D97706'/><rect x='16' y='116' width='175' height='14' fill='#D97706'/>
  <text x='103' y='84' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' font-weight='700' fill='#D97706'>STAGE 0</text>
  <text x='103' y='115' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='16' font-weight='700' fill='white'>SecretScan</text>
  <text x='103' y='154' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='14' font-weight='700' fill='#FCD34D'>detect-secrets</text>
  <text x='103' y='180' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#C9D1D9'>Scans all files</text>
  <text x='103' y='202' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#C9D1D9'>before any code</text>
  <text x='103' y='224' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#C9D1D9'>runs</text>
  <text x='103' y='252' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#8B949E'>excludes .env.example</text>
  <text x='103' y='272' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='#8B949E'>gates all stages</text>

