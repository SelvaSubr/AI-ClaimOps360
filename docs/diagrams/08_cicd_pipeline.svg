  <text x='700' y='40' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='20' font-weight='700' fill='white'>Azure DevOps CI/CD — 7-Stage Pipeline</text>
  <text x='700' y='62' text-anchor='middle' font-family='Segoe UI,system-ui,sans-serif' font-size='13' fill='rgba(255,255,255,0.78)'>Triggers on push + PR to main and dev · DENIAL_MODEL_VERSION=v2</text>

  <!-- 7 stage boxes w=175 gap=14 start=16 h=280 y=84 -->
